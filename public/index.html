<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สร้าง QR Code - ระบบเก็บคะแนนความพึงพอใจลูกค้า</title>
    <link rel="preload" href="/fonts/noto-sans-thai-400-thai.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/noto-sans-thai-500-thai.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/webview-helper.js"></script>
    <!-- QR Code client-side rendering library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script>
        fetch('/api/config/qr-base').then(r => r.json()).then(cfg => {
            window.QR_REDIRECT_BASE = cfg.baseUrl;
        });
    </script>
</head>
<body>

    <div id="webview-banner" class="webview-banner" hidden>
        <div class="webview-banner-content">
            <div class="webview-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
            </div>
            <div class="webview-text">
                <p class="webview-title">เปิดในเบราว์เซอร์เพื่อใช้งานครบทุกฟีเจอร์</p>
                <p class="webview-detail">บางฟังก์ชัน เช่น บันทึกรูปและแชร์ อาจไม่ทำงานในแอป <span id="webview-app-name">นี้</span></p>
            </div>
            <button id="open-in-browser-btn" class="webview-btn">เปิด</button>
        </div>
    </div>

    <div class="container-mobile">
        
        <!-- Header: Banking App Style -->
        <header class="bank-header">
            <div class="logo-box">QR</div>
            <div class="header-text">
                <h1>สร้าง QR Code</h1>
                <p>แบบสอบถามความพึงพอใจลูกค้า</p>
            </div>
        </header>

        <!-- Form Card -->
        <main class="card" id="form-card">
            <div class="form-group">
                <label for="empId">รหัสพนักงาน <span class="required">*</span></label>
                <input type="text" id="empId" class="form-control" placeholder="" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="empName">ชื่อ-นามสกุล <span class="required">*</span></label>
                <input type="text" id="empName" class="form-control" placeholder="" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="projectName">ชื่อโครงการ <span class="required">*</span></label>
                <input type="text" id="projectName" class="form-control" placeholder="" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="jobNo">เลข Job งาน <span class="required">*</span></label>
                <input type="text" id="jobNo" class="form-control" placeholder="ระบุเลข Job เช่น JOB12345" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="customerName">ลูกค้า <span class="required">*</span></label>
                <input type="text" id="customerName" class="form-control" placeholder="" autocomplete="off" required>
            </div>

            <button type="button" id="btn-generate" class="btn btn-primary">
                สร้าง QR Code
            </button>
        </main>

        <!-- QR Code Section (Hidden by default) -->
        <section class="card hidden" id="qr-section">
            <div class="qr-section">
                <div class="qr-canvas-container">
                    <canvas id="qr-canvas"></canvas>
                </div>
                
                <div class="qr-info">
                    <div class="qr-summary-row">
                        <span class="qr-info-label">รหัสพนักงาน:</span>
                        <span class="qr-info-value" id="displayEmpId">-</span>
                    </div>
                    <div class="qr-summary-row">
                        <span class="qr-info-label">ชื่อเซลล์:</span>
                        <span class="qr-info-value" id="displayEmpName">-</span>
                    </div>
                    <div class="qr-summary-row">
                        <span class="qr-info-label">เลข Job งาน:</span>
                        <span class="qr-info-value" id="displayJobNo">-</span>
                    </div>
                    <div class="qr-summary-row">
                        <span class="qr-info-label">โครงการ:</span>
                        <span class="qr-info-value" id="displayProject">-</span>
                    </div>
                    <div class="qr-summary-row">
                        <span class="qr-info-label">ลูกค้า:</span>
                        <span class="qr-info-value" id="displayCustomer">-</span>
                    </div>
                </div>
            </div>

            <div class="btn-grid">
                <button type="button" id="btn-save" class="btn btn-outline" title="บันทึกรูปภาพ">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    <span class="normal-label">บันทึกรูป</span>
                    <span class="webview-label">วิธีบันทึกรูป</span>
                </button>
                <button type="button" id="btn-share" class="btn btn-outline" title="แชร์">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                    แชร์
                </button>
                <button type="button" id="btn-copy" class="btn btn-outline" title="คัดลอกลิงก์">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    คัดลอกลิงก์
                </button>
            </div>

            <button type="button" id="btn-reset" class="btn-subtle-text">
                ← สร้าง QR ใหม่
            </button>
        </section>

    </div>

    <!-- Reusable Black Toast Message Box -->
    <div id="toast" class="toast-container">ข้อความแจ้งเตือน</div>

    <script src="js/qr-generator.js"></script>
</body>
</html>
