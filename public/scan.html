<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>กำลังเปลี่ยนหน้า...</title>
  <link rel="preload" href="/fonts/noto-sans-thai-400-thai.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/noto-sans-thai-500-thai.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/fonts.css">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/webview-helper.js"></script>
    <style>
      @keyframes spin { 100% { transform: rotate(360deg); } }
      body { background-color: #F9FAFB; margin: 0; min-height: 100vh; display: flex; flex-direction: column; font-family: 'Noto Sans Thai', sans-serif; }
    </style>
</head>
<body>
  <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px 16px; width: 100%; box-sizing: border-box;">
    <main style="background: #FFFFFF; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; padding: 28px 24px; box-sizing: border-box;">
      <div style="text-align: center;" id="loading-container">
        <svg id="scanSpinner" viewBox="0 0 50 50" style="width: 64px; height: 64px; animation: spin 1s linear infinite; margin: 0 auto 24px auto; color: #10B981;">
            <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" style="opacity: 0.2;"></circle>
            <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-dasharray="31.4 125.6" style="opacity: 1;"></circle>
        </svg>
        <h2 style="font-size: 20px; color: #0F6E56; font-weight: 600; margin-bottom: 8px; margin-top: 0;">กำลังเปิดแบบฟอร์ม...</h2>
        <p id="scanStatus" style="font-size: 14px; color: #6B7280; margin: 0;">กรุณารอสักครู่</p>
        <p id="scanError" style="color: #DC2626; margin-top: 16px; font-size: 14px;" hidden></p>
      </div>

      <!-- WebView Warning (For iOS in-app browsers like LINE/FB) -->
      <div id="webview-warning" style="text-align: center; display: none; width: 100%;">
        <div style="background: #FEF3C7; border-radius: 12px; padding: 16px; margin-bottom: 24px; color: #D97706; text-align: left; display: flex; align-items: flex-start; gap: 12px; font-size: 14px; line-height: 1.5;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 2px;">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <div>
            <strong style="display: block; font-size: 15px; margin-bottom: 4px;">เปิดใน Safari เพื่อความถูกต้อง</strong>
            ระบบตรวจพบว่าท่านเปิดผ่านเบราว์เซอร์ในแอป <span id="detected-app" style="font-weight: bold;">LINE</span> แนะนำให้เปิดใน Safari เพื่อป้องกันความผิดพลาดครับ
          </div>
        </div>
        
        <h3 style="font-size: 16px; color: #374151; font-weight: 600; margin-bottom: 12px; margin-top: 0; text-align: left;">วิธีเปิดด้วย Safari:</h3>
        <div style="background: #F3F4F6; border-radius: 12px; padding: 16px; text-align: left; font-size: 14px; color: #4B5563; margin-bottom: 24px;">
          <ol style="margin: 0; padding-left: 20px; line-height: 1.8;">
            <li>กดปุ่ม <strong style="color: #111827;">⋯ (จุดสามจุด)</strong> หรือไอคอนแชร์ที่มุมขวาบน</li>
            <li>เลือก <strong style="color: #0F6E56;">"เปิดด้วยเบราว์เซอร์อื่น"</strong> หรือ <strong style="color: #0F6E56;">"เปิดใน Safari"</strong></li>
          </ol>
        </div>

        <button id="btn-copy-link" style="width: 100%; background: #10B981; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); outline: none;">
          คัดลอกลิงก์เพื่อไปเปิดเอง
        </button>
      </div>
    </main>
  </div>

  <script>
    // Generate UUID v4 for session tracking
    function generateUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    // Helper: fetch with timeout to prevent hanging on poor connections
    function fetchWithTimeout(resource, options = {}) {
      const { timeout = 8000 } = options;
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      return fetch(resource, {
        ...options,
        signal: controller.signal
      }).then(response => {
        clearTimeout(id);
        return response;
      }).catch(err => {
        clearTimeout(id);
        throw err;
      });
    }

    function sanitizeString(str) {
      if (!str) return '';
      return str.replace(/<[^>]*>/g, '').replace(/[^\u0E00-\u0E7Fa-zA-Z0-9\s\-_./()]/g, '').trim().substring(0, 100);
    }

    (async function() {
      const params = new URLSearchParams(window.location.search);
      const empId = sanitizeString(params.get('emp_id'));
      const empName = sanitizeString(params.get('emp_name'));
      const project = sanitizeString(params.get('project'));
      const customer = sanitizeString(params.get('customer'));
      const statusEl = document.getElementById('scanStatus');
      const errorEl = document.getElementById('scanError');
      const spinner = document.getElementById('scanSpinner');

      if (!empId || !empName || !project || !customer) {
        errorEl.hidden = false;
        errorEl.textContent = 'ลิงก์ QR Code ไม่ถูกต้อง กรุณาขอลิงก์ใหม่จากเจ้าหน้าที่';
        statusEl.hidden = true;
        if (spinner) spinner.style.display = 'none';
        return;
      }

      // Check if running inside LINE or Facebook WebViews (In-App Browsers)
      const inAppApp = window.InAppBrowser && window.InAppBrowser.detect();
      if (inAppApp) {
        if (window.InAppBrowser.isAndroid()) {
          // Android Webview: redirect directly to Chrome
          window.InAppBrowser.openInExternalBrowser();
          return;
        } else if (window.InAppBrowser.isIOS()) {
          // iOS Webview: Show friendly visual guide to open in Safari
          const loadingContainer = document.getElementById('loading-container');
          const webviewWarning = document.getElementById('webview-warning');
          const detectedAppSpan = document.getElementById('detected-app');
          
          if (loadingContainer) loadingContainer.style.display = 'none';
          if (webviewWarning) {
            webviewWarning.style.display = 'block';
            if (detectedAppSpan) detectedAppSpan.textContent = inAppApp;
          }

          const copyBtn = document.getElementById('btn-copy-link');
          if (copyBtn) {
            const copySuccess = (btn) => {
              btn.textContent = 'คัดลอกลิงก์สำเร็จแล้ว!';
              btn.style.background = '#059669';
              setTimeout(() => {
                btn.textContent = 'คัดลอกลิงก์เพื่อไปเปิดเอง';
                btn.style.background = '#10B981';
              }, 2000);
            };

            const fallbackCopy = (text, btn) => {
              const tempInput = document.createElement('input');
              tempInput.value = text;
              tempInput.style.position = 'absolute';
              tempInput.style.left = '-9999px';
              document.body.appendChild(tempInput);
              tempInput.select();
              tempInput.setSelectionRange(0, 99999);
              
              let success = false;
              try {
                success = document.execCommand('copy');
              } catch (err) {
                success = false;
              }
              document.body.removeChild(tempInput);
              
              if (success) {
                copySuccess(btn);
              } else {
                window.prompt('กรุณาคัดลอกลิงก์ด้านล่างนี้ไปวางในเบราว์เซอร์ Safari:', text);
              }
            };

            copyBtn.addEventListener('click', () => {
              const url = window.location.href;
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url).then(() => {
                  copySuccess(copyBtn);
                }).catch(() => {
                  fallbackCopy(url, copyBtn);
                });
              } else {
                fallbackCopy(url, copyBtn);
              }
            });
          }
          return; // Stop automatic loading and redirect for iOS in-app browser
        }
      }

      // 1. ตรวจสอบซ้ำ — ถ้าเคยทำแล้ว redirect ไป survey.html step4 (completed)
      const completedKey = 'sst_completed_project_' + project;
      if (localStorage.getItem(completedKey) === 'true') {
        const session = {
          session_id: generateUUID(),
          emp_id: empId,
          emp_name: empName,
          project: project,
          customer: customer,
          scanned_at: Date.now(),
          expires_at: Date.now() + (4 * 60 * 60 * 1000),
          already_completed: true
        };
        localStorage.setItem('sst_session', JSON.stringify(session));
        window.location.replace('/survey.html');
        return;
      }

      // 2. ตรวจสอบที่ฝั่ง Server (Fallback เผื่อลูกค้าล้าง Cache หรือสแกนผ่านอุปกรณ์อื่น)
      try {
        const checkRes = await fetchWithTimeout('/api/survey/check-completed?emp_id=' + encodeURIComponent(empId) + '&customer=' + encodeURIComponent(customer) + '&project=' + encodeURIComponent(project), { timeout: 6000 });
        if (checkRes.ok) {
          const checkData = await checkRes.json();
          if (checkData.completed || checkData.final_step_done) {
            localStorage.setItem(completedKey, 'true');
            const session = {
              session_id: generateUUID(),
              emp_id: empId,
              emp_name: empName,
              project: project,
              customer: customer,
              scanned_at: Date.now(),
              expires_at: Date.now() + (4 * 60 * 60 * 1000),
              already_completed: true
            };
            localStorage.setItem('sst_session', JSON.stringify(session));
            window.location.replace('/survey.html');
            return;
          }
        }
      } catch (err) {
        console.warn('Duplicate check failed, letting user proceed:', err);
      }

      // 3. สร้าง session ใหม่ — ยังไม่เคยทำ
      const sessionId = generateUUID();
      const session = {
        session_id: sessionId,
        emp_id: empId,
        emp_name: empName,
        project: project,
        customer: customer,
        scanned_at: Date.now(),
        expires_at: Date.now() + (4 * 60 * 60 * 1000)
      };
      localStorage.setItem('sst_session', JSON.stringify(session));

      // QR scan event is tracked via /api/events below

      // ยิง Event "scanned" → event tracking
      try {
        await fetchWithTimeout('/api/events', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id: sessionId,
            event_type: 'scanned',
            employee_id: empId,
            employee_name: empName,
            customer_name: customer,
            project_name: project
          }),
          timeout: 4000
        });
      } catch (err) {
        console.warn('Event tracking failed (continuing):', err);
      }

      // Redirect ไปยังหน้า survey.html (Multi-Step Wizard ใหม่)
      setTimeout(() => {
        window.location.href = '/survey.html';
      }, 800);
    })();
  </script>
</body>
</html>
