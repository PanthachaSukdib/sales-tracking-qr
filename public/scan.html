<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>กำลังเปลี่ยนหน้า...</title>
  <link rel="preload" href="/fonts/noto-sans-thai-400-thai.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/noto-sans-thai-500-thai.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/css/fonts.css">
  <link rel="stylesheet" href="/css/styles.css">
  <script src="/js/webview-helper.js"></script>
  <style>
    .scan-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
      width: 100%;
    }
    .scan-card {
      background-color: var(--bg-card);
      border-radius: var(--radius-card);
      padding: 32px 24px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border-left-color: var(--primary);
      animation: spin 1s linear infinite;
      margin: 0 auto 20px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .scan-card h2 { margin-bottom: 12px; color: var(--text-primary); }
    .scan-card p { color: var(--text-secondary); line-height: 1.5; }
    #scanError { color: var(--danger); font-weight: 500; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="scan-container">
    <div class="scan-card">
      <div class="spinner"></div>
      <h2>กำลังเปิดแบบฟอร์ม...</h2>
      <p id="scanStatus">กรุณารอสักครู่</p>
      <p id="scanError" hidden></p>
    </div>
  </div>

  <script>
    // Generate UUID v4 for session tracking
    function generateUUID() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    (async function() {
      const params = new URLSearchParams(window.location.search);
      const empId = params.get('emp_id');
      const empName = params.get('emp_name');
      const project = params.get('project');
      const customer = params.get('customer');
      const statusEl = document.getElementById('scanStatus');
      const errorEl = document.getElementById('scanError');
      const spinner = document.querySelector('.spinner');

      if (!empId || !empName || !project || !customer) {
        errorEl.hidden = false;
        errorEl.textContent = 'ลิงก์ QR Code ไม่ถูกต้อง กรุณาขอลิงก์ใหม่จากเจ้าหน้าที่';
        statusEl.hidden = true;
        spinner.style.display = 'none';
        return;
      }

      // 1. ตรวจสอบใน localStorage ก่อนเพื่อการตอบสนองที่รวดเร็ว (Instant Check)
      const completedKey = 'sst_completed_' + empId + '_' + customer + '_' + project;
      const finalDoneKey = 'sst_final_done_' + empId + '_' + customer + '_' + project;

      if (localStorage.getItem(completedKey) === 'true') {
        if (localStorage.getItem(finalDoneKey) === 'true') {
          // หากผู้ใช้ให้ดาวและทำฟอร์มครบหมดแล้ว → ส่งไปหน้าขอบคุณทันที
          window.location.replace('/thank-you.html?already_completed=1');
          return;
        } else {
          // หากผู้ใช้ให้ดาวแล้วแต่เผลอกดออก/ปิดเว็บก่อนทำฟอร์ม → ฟื้นฟู Session และพาไปหน้า Bridge สเต็ปถัดไปเพื่อกรอกฟอร์มต่อ
          const sessionId = generateUUID();
          const session = {
            session_id: sessionId,
            emp_id: empId,
            emp_name: empName,
            project: project,
            customer: customer,
            scanned_at: Date.now(),
            expires_at: Date.now() + (4 * 60 * 60 * 1000),
            survey_score: 5 // คะแนนจำลองเพื่อให้ระบบสเต็ป 3 สามารถทำงานได้ถูกต้อง
          };
          localStorage.setItem('sst_session', JSON.stringify(session));
          window.location.replace('/next-step.html');
          return;
        }
      }

      // 2. ตรวจสอบที่ฝั่ง Server (Fallback เผื่อลูกค้าล้าง Cache หรือสแกนผ่านอุปกรณ์อื่น)
      try {
        const checkRes = await fetch('/api/survey/check-completed?emp_id=' + encodeURIComponent(empId) + '&customer=' + encodeURIComponent(customer) + '&project=' + encodeURIComponent(project));
        if (checkRes.ok) {
          const checkData = await checkRes.json();
          if (checkData.completed) {
            localStorage.setItem(completedKey, 'true');
            if (checkData.final_step_done) {
              localStorage.setItem(finalDoneKey, 'true');
              window.location.replace('/thank-you.html?already_completed=1');
              return;
            } else {
              // ให้ดาวแล้วแต่ยังทำฟอร์มไม่เสร็จ → สร้าง Session พาไปทำฟอร์มต่อทันที
              const sessionId = generateUUID();
              const session = {
                session_id: sessionId,
                emp_id: empId,
                emp_name: empName,
                project: project,
                customer: customer,
                scanned_at: Date.now(),
                expires_at: Date.now() + (4 * 60 * 60 * 1000),
                survey_score: 5
              };
              localStorage.setItem('sst_session', JSON.stringify(session));
              window.location.replace('/next-step.html');
              return;
            }
          }
        }
      } catch (err) {
        console.warn('Duplicate check failed, letting user proceed:', err);
      }

      // สร้าง session_id สำหรับ tracking ตลอด journey
      const sessionId = generateUUID();

      // เก็บใน localStorage (session valid 4 ชม.)
      const session = {
        session_id: sessionId,
        emp_id: empId,
        emp_name: empName,
        project: project,
        customer: customer,
        scanned_at: Date.now(),
        expires_at: Date.now() + (4 * 60 * 60 * 1000)
      };
      localStorage.setItem('sst_session', JSON.stringify(session));

      // log scan ไป backend (qr_logs — เดิม)
      try {
        await fetch('/api/qr-logs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            employee_id: empId,
            employee_name: empName,
            project_name: project,
            customer_name: customer,
            generated_url: window.location.href
          })
        });
      } catch (err) {
        console.warn('Log failed (continuing):', err);
      }

      // ยิง Event "scanned" → event tracking
      try {
        await fetch('/api/events', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id: sessionId,
            event_type: 'scanned',
            employee_id: empId,
            employee_name: empName,
            customer_name: customer,
            project_name: project
          })
        });
      } catch (err) {
        console.warn('Event tracking failed (continuing):', err);
      }

      // Redirect ไปยังหน้าประเมินดาว survey.html หลังบันทึกข้อมูลการสแกนเสร็จสิ้น
      setTimeout(() => {
        window.location.href = '/survey.html';
      }, 800);
    })();
  </script>
</body>
</html>
