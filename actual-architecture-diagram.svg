<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="100%" height="100%">
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;family=Noto+Sans+Thai:wght@300;400;500;600;700&amp;display=swap');
      
      .text-title { font-family: 'Outfit', 'Noto Sans Thai', sans-serif; font-weight: 700; fill: #F8FAFC; }
      .text-subtitle { font-family: 'Outfit', 'Noto Sans Thai', sans-serif; font-weight: 400; fill: #94A3B8; }
      .text-node-title { font-family: 'Outfit', 'Noto Sans Thai', sans-serif; font-weight: 700; font-size: 16px; }
      .text-node-body { font-family: 'Outfit', 'Noto Sans Thai', sans-serif; font-weight: 400; font-size: 12px; fill: #94A3B8; }
      .text-flow-label { font-family: 'Outfit', 'Noto Sans Thai', sans-serif; font-weight: 600; font-size: 11px; }
      .text-flow-sub { font-family: 'Outfit', 'Noto Sans Thai', sans-serif; font-weight: 400; font-size: 9px; fill: #64748b; }
      .text-desc-title { font-family: 'Outfit', 'Noto Sans Thai', sans-serif; font-weight: 700; font-size: 13px; fill: #60a5fa; }
      .text-desc-body { font-family: 'Outfit', 'Noto Sans Thai', sans-serif; font-weight: 400; font-size: 12px; fill: #94A3B8; }
      
      .node-card { transition: transform 0.3s ease; cursor: pointer; }
      .node-card:hover { transform: translate(0, -5px); }
    </style>

    <!-- Markers for Arrows -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#f59e0b" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#0B0F19" />
  
  <!-- Subtle Grid Pattern in background -->
  <g opacity="0.05">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350 M 0,400 L 1200,400 M 0,450 L 1200,450 M 0,500 L 1200,500 M 0,550 L 1200,550 M 0,600 L 1200,600" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,675 M 200,0 L 200,675 M 300,0 L 300,675 M 400,0 L 400,675 M 500,0 L 500,675 M 600,0 L 600,675 M 700,0 L 700,675 M 800,0 L 800,675 M 900,0 L 900,675 M 1000,0 L 1000,675 M 1100,0 L 1100,675" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title & Subtitle -->
  <text x="50" y="55" class="text-title" font-size="26">System Architecture (Actual Stack)</text>
  <text x="50" y="82" class="text-subtitle" font-size="14">Vanilla HTML/JS + Node.js/Express + Supabase — สถาปัตยกรรมที่ใช้งานจริงในระบบของคุณปัจจุบัน</text>

  <!-- Status Indicator Badge -->
  <g transform="translate(990, 40)">
    <rect width="160" height="30" rx="15" fill="#3b82f6" opacity="0.15" />
    <rect width="160" height="30" rx="15" stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.4" />
    <circle cx="20" cy="15" r="5" fill="#3b82f6" />
    <text x="35" y="19" family="Outfit" font-weight="600" font-size="11" fill="#60a5fa">Actual Code Stack</text>
  </g>

  <!-- ==================== CONNECTION FLOW LINES ==================== -->
  
  <!-- Flow 1: Client JS to Supabase Auth (Auth Check) -->
  <path d="M 200,200 C 200,120 500,100 880,200" fill="none" stroke="#10b981" stroke-width="2.5" stroke-dasharray="4" marker-end="url(#arrow-green)" />
  <!-- Label 1 -->
  <rect x="470" y="115" width="220" height="28" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1" opacity="0.9" />
  <text x="580" y="132" class="text-flow-label" fill="#34d399" text-anchor="middle">1. ล็อกอิน / จัดการ Session (Supabase Auth)</text>
  
  <!-- Flow 2: Supabase returns Session JWT -->
  <path d="M 880,230 C 500,140 230,150 200,220" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <!-- Label 2 -->
  <rect x="470" y="160" width="220" height="28" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1" opacity="0.9" />
  <text x="580" y="177" class="text-flow-label" fill="#60a5fa" text-anchor="middle">2. ส่งคืน JWT ID Token (access_token)</text>

  <!-- Flow 3: Client JS to Express Backend (API request with JWT in Authorization) -->
  <path d="M 230,330 L 450,330" fill="none" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-orange)" />
  <!-- Label 3 -->
  <rect x="260" y="300" width="160" height="28" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1" opacity="0.9" />
  <text x="340" y="317" class="text-flow-label" fill="#fbbf24" text-anchor="middle">3. Call API + Bearer Token</text>

  <!-- Flow 4: Express Backend to Supabase Client SDK (Verify & DB Queries) -->
  <path d="M 700,330 L 850,330" fill="none" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)" />
  <!-- Label 4 -->
  <rect x="715" y="295" width="120" height="34" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1" opacity="0.9" />
  <text x="775" y="310" class="text-flow-label" fill="#34d399" text-anchor="middle">4. Verify Token &amp; DB</text>
  <text x="775" y="322" class="text-flow-sub" text-anchor="middle">ผ่าน Supabase Client SDK</text>

  <!-- ==================== NODES / CARDS ==================== -->

  <!-- NODE 1: HTML/JS Frontend (Client Browser) -->
  <g class="node-card" transform="translate(50, 220)">
    <rect width="200" height="220" rx="16" fill="rgba(17, 24, 39, 0.7)" stroke="#3b82f6" stroke-width="2" />
    <rect width="200" height="220" rx="16" fill="rgba(59, 130, 246, 0.03)" />
    <!-- Icon Container -->
    <rect x="20" y="20" width="40" height="40" rx="10" fill="rgba(59, 130, 246, 0.15)" />
    <!-- Screen Icon -->
    <path d="M 28,32 L 52,32 M 32,48 L 48,48 M 40,40 L 40,48" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" />
    <rect x="28" y="28" width="24" height="15" rx="2" fill="none" stroke="#60a5fa" stroke-width="2" />
    
    <text x="20" y="85" class="text-node-title" fill="#60a5fa">Vanilla HTML/JS</text>
    <text x="20" y="105" class="text-subtitle" font-size="11" font-weight="600" fill="#3b82f6">CLIENT BROWSER (PUBLIC/)</text>
    
    <text x="20" y="135" class="text-node-body">• หน้าหลักสร้าง QR (`index.html`)</text>
    <text x="20" y="155" class="text-node-body">• หน้าสแกน / แบบสอบถาม</text>
    <text x="20" y="175" class="text-node-body">• แดชบอร์ดสรุปผลวิเคราะห์</text>
    <text x="20" y="195" class="text-node-body">• เรียกใช้ Supabase CDN SDK</text>
  </g>

  <!-- NODE 2: Express Backend (Node.js main server) -->
  <g class="node-card" transform="translate(470, 220)">
    <rect width="220" height="220" rx="16" fill="rgba(17, 24, 39, 0.7)" stroke="#f59e0b" stroke-width="2" />
    <rect width="220" height="220" rx="16" fill="rgba(245, 158, 11, 0.03)" />
    <!-- Icon Container -->
    <rect x="20" y="20" width="40" height="40" rx="10" fill="rgba(245, 158, 11, 0.15)" />
    <!-- Server Icon -->
    <rect x="28" y="28" width="24" height="10" rx="2" fill="none" stroke="#fbbf24" stroke-width="2" />
    <rect x="28" y="42" width="24" height="10" rx="2" fill="none" stroke="#fbbf24" stroke-width="2" />
    <circle cx="33" cy="33" r="1.5" fill="#fbbf24" />
    <circle cx="33" cy="47" r="1.5" fill="#fbbf24" />
    
    <text x="75" y="38" class="text-node-title" fill="#fbbf24">Express Backend</text>
    <text x="75" y="53" class="text-subtitle" font-size="10" font-weight="600" fill="#f59e0b">NODE.JS SERVER (SERVER.JS)</text>
    
    <text x="20" y="130" class="text-node-body">• API Routes (survey, qr-logs)</text>
    <text x="20" y="150" class="text-node-body">• ตรวจสอบ Token (Middleware)</text>
    <text x="20" y="170" class="text-node-body">• ยืนยันตัวพนักงานก่อนทำงาน</text>
    <text x="20" y="190" class="text-node-body">• บันทึกประวัติ / เชื่อมต่อ Database</text>
  </g>

  <!-- NODE 3: Supabase Services (Auth & DB Cloud Platform) -->
  <g class="node-card" transform="translate(870, 220)">
    <rect width="260" height="220" rx="16" fill="rgba(17, 24, 39, 0.7)" stroke="#10b981" stroke-width="2" />
    <rect width="260" height="220" rx="16" fill="rgba(16, 185, 129, 0.03)" />
    <!-- Icon Container -->
    <rect x="20" y="20" width="40" height="40" rx="10" fill="rgba(16, 185, 129, 0.15)" />
    <!-- Cloud Icon -->
    <path d="M43.83,38a5.5,5.5,0,0,0-10.66-2A7,7,0,0,0,21,42a7,7,0,0,0,7,7H43.67A5.33,5.33,0,0,0,49,43.67,5.39,5.39,0,0,0,43.83,38Z" fill="none" stroke="#34d399" stroke-width="2" stroke-linejoin="round" />
    
    <text x="75" y="38" class="text-node-title" fill="#34d399">Supabase Platform</text>
    <text x="75" y="53" class="text-subtitle" font-size="10" font-weight="600" fill="#10b981">DATABASE &amp; AUTH SERVICE</text>
    
    <text x="20" y="125" class="text-node-body">• **Supabase Auth**: ยืนยันพนักงาน</text>
    <text x="20" y="145" class="text-node-body">• **PostgreSQL DB**: เก็บข้อมูลทั้งหมด</text>
    <text x="20" y="165" class="text-node-body">  - ตาราง `survey_results` (คะแนนประเมิน)</text>
    <text x="20" y="185" class="text-node-body">  - ตาราง `qr_logs` (ประวัติการสร้าง QR)</text>
    <text x="20" y="205" class="text-node-body">  - ตาราง `events` / `employees`</text>
  </g>

  <!-- ==================== GOOGLE SHEETS / MS FORMS REDIRECT (MINI-NODE) ==================== -->
  <g transform="translate(470, 100)">
    <rect width="220" height="70" rx="12" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    <text x="15" y="28" family="Outfit" font-weight="700" font-size="12" fill="#94A3B8">External Integration</text>
    <text x="15" y="45" family="Outfit" font-size="10" fill="#64748b">• Google Sheets API (เก็บประวัติสำรอง/Legacy)</text>
    <text x="15" y="58" family="Outfit" font-size="10" fill="#64748b">• Microsoft Forms Redirect (ทำแบบประเมิน)</text>
    <path d="M 580,170 L 580,220" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="3" />
  </g>

  <!-- ==================== KEY DESIGN DECISION BLOCK ==================== -->
  <g transform="translate(50, 500)">
    <rect width="1100" height="120" rx="16" fill="rgba(59, 130, 246, 0.05)" stroke="rgba(59, 130, 246, 0.2)" stroke-width="1.5" />
    <g transform="translate(25, 22)">
      <circle cx="15" cy="15" r="8" fill="none" stroke="#60a5fa" stroke-width="2" />
      <path d="M 15,23 L 15,35 M 15,30 L 22,30 M 15,35 L 20,35" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" fill="none" />
    </g>
    <text x="65" y="42" class="text-desc-title" fill="#60a5fa">รายละเอียดโครงสร้างระบบตามการพัฒนาโค้ดจริง (Express API + Supabase Integration)</text>
    <text x="65" y="70" class="text-desc-body">1. ในโค้ดปัจจุบันของคุณ **ไม่มีการใช้งาน Firebase Auth** และ **ไม่ได้เขียนแบบ Next.js/NestJS** แต่ใช้งาน **Supabase Client SDK** ในการจัดการหน้าจอและฐานข้อมูลโดยสมบูรณ์</text>
    <text x="65" y="92" class="text-desc-body">2. การตรวจสอบสิทธิ์ทำบน **Node.js/Express API Middleware** โดยการแกะ JWT Token (`access_token` ของ Supabase) ที่ส่งมาจากหน้าบ้านเทียบกับสิทธิ์ของ Supabase Auth เพื่อรักษาความปลอดภัยของข้อมูล</text>
  </g>
  
</svg>
